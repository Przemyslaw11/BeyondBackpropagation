# File: configs/cafo/mnist_cnn_3block.yaml
# Configuration for Cascaded Forward (CaFo) on MNIST with 3-Block CNN

# Inherit from base config
experiment_name: "cafo_mnist_cnn_3block" # Changed name
algorithm:
  name: "CaFo"

# Dataset Configuration
data:
  name: "MNIST" # Changed dataset name
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Base blocks - Same as FMNIST)
model:
  name: "CaFo_CNN"
  params:
    # input_channels: 1 # Calculated
    block_channels: [32, 128, 512]
    activation: "ReLU"
    use_batchnorm: true
    kernel_size: 3
    pool_kernel_size: 2
    pool_stride: 2
    # image_size: 28 # Calculated
    # num_classes: 10 # Calculated

# Algorithm Specific Configuration (CaFo-Rand-CE - Same as FMNIST)
algorithm_params:
  optimizer_type: "Adam"
  lr: 0.001
  weight_decay: 0.0
  loss_type: "CrossEntropyLoss"
  epochs_per_block: 500 # Re-using FMNIST value, adjust if needed for MNIST convergence
  log_interval: 200

  predictor_early_stopping_enabled: true
  predictor_early_stopping_metric: "val_loss" # Monitor validation loss of the predictor
  predictor_early_stopping_patience: 20       # Patience (e.g., 20 epochs for MNIST)
  predictor_early_stopping_mode: "min"        # Minimize loss
  predictor_early_stopping_min_delta: 0.0005  # Minimum improvement required (smaller for MNIST?)

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true

# Checkpointing (Save predictors after training)
checkpointing:
  checkpoint_dir: "checkpoints/cafo_mnist_cnn_3block" # Changed dir name

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false