# File: configs/cafo/cafodfa_cifar10_cnn_3block_tune.yaml
experiment_name: "tune_cafodfa_cifar10_cnn_3block"
algorithm: { name: "CaFo" }
data: { name: "CIFAR10", root: "./data", val_split: 0.1, num_classes: 10, input_channels: 3, image_size: 32 }
data_loader: { batch_size: 128, num_workers: 0, pin_memory: false }
model:
  name: "CaFo_CNN"
  params: { block_channels: [32, 128, 512], activation: "ReLU", use_batchnorm: true, kernel_size: 3, pool_kernel_size: 2, pool_stride: 2 }

# Algorithm Specific Configuration (Placeholders)
algorithm_params:
  train_blocks: true
  block_training_epochs: 300          # Fixed from best run
  block_optimizer_type: "Adam"
  block_lr: 0.0001                    # Placeholder
  block_weight_decay: 0.0             # Placeholder
  predictor_optimizer_type: "Adam"
  predictor_lr: 0.001                 # Placeholder
  predictor_weight_decay: 0.0         # Placeholder
  loss_type: "CrossEntropyLoss"
  num_epochs_per_block: 100           # Placeholder (was 100 in best run)
  log_interval: 9999
  aggregation_method: "sum"

logging: { level: "INFO", wandb: { use_wandb: false } }
checkpointing: { checkpoint_dir: null }
monitoring: { enabled: false, energy_enabled: false }
profiling: { enabled: false }

# --- Optuna Tuning Configuration ---
tuning:
  enabled: true
  n_trials: 50 # Adjust
  direction: "maximize"
  metric: "val_accuracy"
  sampler: "TPE"
  pruner: "None"
  # --- Ranges informed by best run (Acc≈78.45%) ---
  cafo_predictor_lr_range: [2.0e-4, 5.0e-3]  # Around 0.001
  cafo_predictor_wd_range: [1.0e-7, 1.0e-4]  # Explore small WD
  cafo_epochs_per_block_range: [70, 150]     # Around 100
  # Block params
  cafo_block_lr_range: [2.0e-5, 5.0e-4]      # Around 0.0001
  cafo_block_wd_range: [1.0e-7, 1.0e-4]      # Explore small WD
  # block_training_epochs is fixed