# File: configs/cafo/cifar10_cnn_3block.yaml
# Configuration for Cascaded Forward (CaFo) on CIFAR-10 with 3-Block CNN

# Inherit from base config
experiment_name: "cafo_cifar10_cnn_3block"
algorithm:
  name: "CaFo"

# Dataset Configuration
data:
  name: "CIFAR10"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 3
  image_size: 32

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Base blocks)
model:
  name: "CaFo_CNN"
  params:
    # input_channels: 3 # Calculated
    block_channels: [32, 128, 512]
    activation: "ReLU"
    use_batchnorm: true
    kernel_size: 3
    pool_kernel_size: 2
    pool_stride: 2
    # image_size: 32 # Calculated
    # num_classes: 10 # Calculated

# Algorithm Specific Configuration (CaFo-Rand-CE)
algorithm_params:
  optimizer_type: "Adam"
  lr: 0.001
  weight_decay: 0.0
  loss_type: "CrossEntropyLoss"
  num_epochs_per_block: 500 # Epochs for predictor training on CIFAR-10
  log_interval: 200


# <<< ADDED/MODIFIED: Training Configuration for Early Stopping >>>
training:
  # epochs: N/A # Base 'epochs' not directly used by CaFo layer-wise training
  criterion: "CrossEntropyLoss" # Used by underlying predictor trainer if needed
  log_interval: 100 # Base log interval (predictor log_interval overrides if needed)
  early_stopping_enabled: true
  early_stopping_metric: "cafo_val_accuracy" # Monitor aggregated validation accuracy
  early_stopping_patience: 10                # Stop if no improvement after 10 predictor stages
  early_stopping_mode: "max"                 # Maximize accuracy
  early_stopping_min_delta: 0.01             # Require at least 0.01% improvement
# <<< END ADDED/MODIFIED >>>

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null
  wandb:
    use_wandb: true

# Checkpointing
checkpointing:
  checkpoint_dir: "checkpoints/cafo_cifar10_cnn_3block"

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false