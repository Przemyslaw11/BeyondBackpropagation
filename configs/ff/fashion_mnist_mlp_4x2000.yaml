# File: configs/ff/fashion_mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (Hinton style) on Fashion-MNIST with 4x2000 MLP

# Experiment Identification
experiment_name: "ff_hinton_fashion_mnist_mlp_4x2000" # Updated name
algorithm:
  name: "FF"

# Dataset Configuration
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1 # Use 10% (~6k) for validation
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 100 # Keep consistent with MNIST example from reference
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "FF_Hinton_MLP" # Use the new model name
  params:
    input_dim: 784 # Explicitly define
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU"
    bias: true
    norm_eps: 1.0e-8
    bias_init: 0.0

# Algorithm Specific Configuration (Forward-Forward Hinton style)
# Using same hyperparams as MNIST ref code, might need tuning for FMNIST
algorithm_params:
  optimizer_type: "AdamW"
  ff_learning_rate: 1e-3
  ff_weight_decay: 3e-4
  downstream_learning_rate: 1e-2
  downstream_weight_decay: 3e-3
  threshold: 2.0
  peer_normalization_factor: 0.03
  peer_momentum: 0.9

# Training Configuration
training:
  epochs: 100 # Start with same as MNIST, adjust if needed
  log_interval: 100

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true

# Checkpointing
checkpointing:
  checkpoint_dir: "checkpoints/ff_hinton_fashion_mnist_mlp_4x2000"
  # save_best_metric: "ff_val_accuracy"

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false