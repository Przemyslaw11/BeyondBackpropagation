# File: configs/ff/fashion_mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (FF) on Fashion-MNIST with 4x2000 MLP

# Inherit from base config (handled by config_parser)
# Values here override base.yaml

# Experiment Identification
experiment_name: "ff_fashion_mnist_mlp_4x2000"
algorithm:
  name: "FF"

# Dataset Configuration
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "FF_MLP"
  params:
    # input_dim: 784 # Calculated
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU"
    normalize_layers: true
    norm_type: 'length' # Use length normalization as per paper footnote 5
    bias: true
    # num_classes: 10 # Calculated

# Algorithm Specific Configuration (Forward-Forward)
algorithm_params:
  optimizer_type: "Adam" # Paper doesn't specify, Adam is common default
  lr: 0.03 # From paper Fig 2 caption for jittered MNIST
  weight_decay: 0.0
  threshold: 2.0 # Seems reasonable starting point
  epochs_per_layer: 60 # From paper Sec 3.3 for comparable MNIST performance
  log_interval: 100

# Logging Configuration (Inherits project/entity from base)
logging:
  level: "INFO"
  # log_file: null # Set dynamically
  wandb:
    use_wandb: true

# Checkpointing (For FF, save after each layer)
checkpointing:
  checkpoint_dir: "checkpoints/ff_fashion_mnist_mlp_4x2000" # Specific directory

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false