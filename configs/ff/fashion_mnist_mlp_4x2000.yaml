# File: configs/ff/fashion_mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (Hinton style) on Fashion-MNIST with 4x2000 MLP
# USING THE REFACTORED FF_MLP model definition

# Experiment Identification
experiment_name: "ff_hinton_style_fashion_mnist_mlp_4x2000" # Clarify name
algorithm:
  name: "FF"

# Dataset Configuration
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 100
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "FF_MLP" # <<< CORRECTED: Use the refactored class name
  params:
    # input_dim will be calculated if omitted
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU" # Activations: ReLU, Tanh
    bias: true
    # Use reference code defaults for eps/bias
    norm_eps: 1.0e-8
    bias_init: 0.0

# Algorithm Specific Configuration (For Hinton-style FF)
algorithm_params:
  optimizer_type: "AdamW"
  # Ensure values are numbers
  ff_learning_rate: 0.0003722230492626773
  ff_weight_decay: 0.0003583569744251919
  downstream_learning_rate: 0.011120232890144957
  downstream_weight_decay: 0.0051200359925764015
  # ff_momentum: 0.9 # Add if using SGD
  # downstream_momentum: 0.9 # Add if using SGD
  threshold: 2.0
  peer_normalization_factor: 0.03
  peer_momentum: 0.9

# Training Configuration
training:
  epochs: 100 # Max epochs
  log_interval: 100
  # <<< ADDED: Early Stopping Configuration >>>
  early_stopping_enabled: true
  early_stopping_metric: "FF_Hinton/Val_Acc_Epoch" # Monitor validation accuracy from FF eval
  early_stopping_patience: 10                      # Number of epochs to wait for improvement
  early_stopping_mode: "max"                       # Maximize accuracy
  early_stopping_min_delta: 0.01                   # Minimum change in accuracy to qualify as improvement
  # <<< END ADDED >>>

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true
    # entity: "przspyra11" # Defined in base.yaml

# Checkpointing
checkpointing:
  checkpoint_dir: "checkpoints/ff_hinton_style_fashion_mnist_mlp_4x2000" # Updated name
  # save_best_metric: "ff_val_accuracy" # Engine uses this key

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false