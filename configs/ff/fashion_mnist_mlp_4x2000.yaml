# File: configs/ff/fashion_mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (FF) on Fashion-MNIST with 4x2000 MLP

# Inherit from base config (handled by config_parser)
# Values here override base.yaml

# Experiment Identification
experiment_name: "ff_fashion_mnist_mlp_4x2000"
algorithm:
  name: "FF" # Specify algorithm

# Dataset Configuration
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1 # Not strictly needed for FF training itself, but good for consistency
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128 # Inherited from base (or set explicitly)
  num_workers: 4 # Adjust based on system capabilities
  pin_memory: true # Enable if using CUDA

# Model Architecture Configuration
model:
  name: "FF_MLP" # Corresponds to src/architectures/ff_mlp.py
  params:
    # input_dim: 784 # Calculated by engine from data config
    hidden_dims: [2000, 2000, 2000, 2000] # 4 hidden layers of 2000 units
    activation: "ReLU"
    normalize_layers: true # As per paper's description
    bias: true
    # num_classes: 10 # Calculated by engine from data config

# Algorithm Specific Configuration (Forward-Forward)
algorithm_params:
  optimizer_type: "Adam" # Optimizer per layer
  lr: 0.03 # Learning rate from FF paper (Figure 2 uses 0.03 for jittered MNIST)
  weight_decay: 0.0 # FF paper often uses no weight decay
  threshold: 2.0 # Goodness threshold (from Sec 2 - 'well above')
  epochs_per_layer: 60 # From Sec 3.3 (60 epochs for 1.36% error) - adjust as needed
  log_interval: 100

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null # Set dynamically by run_experiment.py
  wandb:
    use_wandb: true
    project: "BeyondBackpropagation" # Inherited or set here
    # entity: null # Inherited (replace if needed)
    # run_name: null # Set dynamically by run_experiment.py

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false # Less verbose profiling output by default