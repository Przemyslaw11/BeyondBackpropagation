# File: configs/ff/mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (Hinton style) on MNIST with 4x2000 MLP

# Experiment Identification
experiment_name: "ff_hinton_mnist_mlp_4x2000" # Updated name
algorithm:
  name: "FF" # Keep algo name

# Dataset Configuration
data:
  name: "MNIST"
  root: "./data"
  val_split: 0.1 # Use 10k MNIST samples for validation (50k train)
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration (Reference code used 100)
data_loader:
  batch_size: 100 # Match reference code batch size
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "FF_Hinton_MLP" # Use the new model name
  params:
    input_dim: 784 # Explicitly define for clarity/BP baseline
    hidden_dims: [2000, 2000, 2000, 2000] # Match 4x2000
    activation: "ReLU" # Reference code used ReLU
    bias: true
    norm_eps: 1.0e-8 # Epsilon used in reference code's norm
    bias_init: 0.0   # Reference code used zero bias init

# Algorithm Specific Configuration (Forward-Forward Hinton style)
algorithm_params:
  optimizer_type: "AdamW" # Common default, paper/code don't specify Adam/SGD explicitly for FF part
  # Learning rates based on reference code's separate groups:
  # <<< MODIFIED: Ensure these are numbers, not strings >>>
  ff_learning_rate: 1e-3
  ff_weight_decay: 3e-4
  downstream_learning_rate: 1e-2
  downstream_weight_decay: 3e-3
  # <<< END MODIFICATION >>>
  threshold: 2.0 # Threshold for goodness calc (paper mentions subtracting dim, ref code uses threshold param)
  # Peer normalization settings (optional, based on reference code config)
  peer_normalization_factor: 0.03 # Example value from ref code
  peer_momentum: 0.9            # Example value from ref code

# Training Configuration
training:
  epochs: 100 # Total epochs for simultaneous training (adjust based on ref code findings)
  log_interval: 100

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true
    # entity: "przspyra11" # Defined in base.yaml

# Checkpointing (Optional: Save best based on validation accuracy)
checkpointing:
  checkpoint_dir: "checkpoints/ff_hinton_mnist_mlp_4x2000"
  # save_best_metric: "ff_val_accuracy" # Default in base.yaml seems to be bp_val_accuracy, need to align if saving best FF

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false

# Ensure base.yaml is also used (handled by config_parser)