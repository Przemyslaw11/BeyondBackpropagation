# File: configs/ff/mnist_mlp_4x2000.yaml (Ensure values are numbers)
experiment_name: "ff_hinton_mnist_mlp_4x2000_revised" # New name maybe
algorithm:
  name: "FF"

data:
  name: "MNIST"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28

data_loader:
  batch_size: 100 # Match reference
  num_workers: 4
  pin_memory: true

model:
  name: "FF_MLP" # Use your modified model name
  params:
    input_dim: 784
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU"
    bias: true
    norm_eps: 1.0e-8 # From reference code
    bias_init: 0.0   # From reference code

# Algorithm Specific Configuration (Hinton style)
algorithm_params:
  optimizer_type: "AdamW"
  # Ensure these are numbers, NOT strings
  ff_learning_rate: 0.0005253511034001832
  ff_weight_decay: 0.0004227844165066995
  downstream_learning_rate: 0.0027075510107757122
  downstream_weight_decay: 0.0035730744916099627
  # Momentum (only used if optimizer_type is SGD)
  # ff_momentum: 0.9
  # downstream_momentum: 0.9
  threshold: 2.0
  peer_normalization_factor: 0.03
  peer_momentum: 0.9

# Training Configuration
training:
  epochs: 100 # Max epochs
  log_interval: 100
  # <<< ADDED: Early Stopping Configuration >>>
  early_stopping_enabled: true
  early_stopping_metric: "FF_Hinton/Val_Acc_Epoch" # Monitor validation accuracy from FF eval
  early_stopping_patience: 10                      # Number of epochs to wait for improvement
  early_stopping_mode: "max"                       # Maximize accuracy
  early_stopping_min_delta: 0.01                   # Minimum change in accuracy to qualify as improvement
  # <<< END ADDED >>>

logging:
  level: "INFO"
  wandb:
    use_wandb: true

checkpointing:
  checkpoint_dir: "checkpoints/ff_hinton_mnist_mlp_4x2000_revised"
  # save_best_metric: "ff_val_accuracy" # Or let engine default

monitoring: {enabled: true, energy_enabled: true, energy_interval_sec: 0.2}
profiling: {enabled: true, verbose: false}