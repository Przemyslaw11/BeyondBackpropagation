# File: configs/ff/mnist_mlp_4x2000.yaml
# Configuration for Forward-Forward (FF) on MNIST with 4x2000 MLP
# Based on paper/reference code settings.
# <<< MODIFIED: Back to lr=0.0003, INCREASED epochs_per_layer, kept eval fix >>>

# Experiment Identification
experiment_name: "ff_mnist_mlp_4x2000_lr0003_e200_evalfix" # Updated name
algorithm:
  name: "FF"

# Dataset Configuration
data:
  name: "MNIST"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "FF_MLP"
  params:
    # input_dim: 784 # Calculated
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU"
    normalize_layers: true
    norm_type: 'length'
    bias: true
    norm_eps: 1.0e-5
    bias_init: 0.1
    # num_classes: 10 # Calculated

# Algorithm Specific Configuration (Forward-Forward)
algorithm_params:
  optimizer_type: "Adam"
  lr: 0.0003     # <<< MODIFIED: Back to low learning rate >>>
  weight_decay: 0.0
  threshold: 2.0
  epochs_per_layer: 200 # <<< MODIFIED: Significantly increased epochs >>>
  log_interval: 100

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true

# Checkpointing
checkpointing:
  checkpoint_dir: "checkpoints/ff_mnist_mlp_4x2000_lr0003_e200_evalfix" # Updated dir

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false

# Ensure base.yaml is also used (handled by config_parser)