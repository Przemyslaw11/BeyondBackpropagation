# File: configs/bp_baselines/cifar10_cnn_4layer_bp.yaml
# BP Baseline for MF CNN on CIFAR-10

experiment_name: "bp_baseline_cifar10_cnn_4layer"
algorithm:
  name: "BP" # <<< SET TO BP >>>

data:
  name: "CIFAR10"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 3
  image_size: 32

data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Points to MF_CNN base)
model:
  name: "MF_CNN" # <<< USE MF_CNN BASE NAME >>>
  params:
    activation: "ReLU" # Keep consistent
    bias: true

optimizer:
  type: AdamW
  lr: 0.0006186895885294356
  weight_decay: 1.04695777419081e-06
training:
  epochs: 100
  criterion: CrossEntropyLoss
  log_interval: 9999
  early_stopping_enabled: true
  early_stopping_metric: bp_val_loss
  early_stopping_patience: 15
  early_stopping_mode: min
  early_stopping_min_delta: 0.0

logging: { level: "INFO", wandb: { use_wandb: true } }
checkpointing: { checkpoint_dir: "checkpoints/bp_baseline_cifar10_cnn_4layer", save_best_metric: "bp_val_accuracy" } # Save best BP model
monitoring: { enabled: true, energy_enabled: true, energy_interval_sec: 0.2 }
profiling: { enabled: true, verbose: false }

# --- Optuna Tuning Configuration (For BP Baseline) ---
tuning:
  enabled: true # Set to true when running tuning
  n_trials: 30 # Number of Optuna trials
  # num_epochs: 25 # Epochs per Optuna trial (for faster tuning)
  direction: "maximize"
  metric: "val_accuracy" # Optuna objective metric
  sampler: "TPE"
  pruner: "Median"
  lr_range: [1.0e-5, 1.0e-2] # Tuning range for BP LR
  wd_range: [1.0e-6, 1.0e-3] # Tuning range for BP WD