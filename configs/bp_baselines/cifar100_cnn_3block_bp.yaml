# File: configs/bp_baselines/cifar100_cnn_3block_bp.yaml
# Configuration for BP Baseline on CIFAR-100 with 3-Block CNN
# Corresponds to cafo_cifar100_cnn_3block experiment

# Inherit from base config
experiment_name: "bp_baseline_cifar100_cnn_3block"
algorithm:
  name: "BP"

# Dataset Configuration (Match CaFo experiment)
data:
  name: "CIFAR100" # Updated for CIFAR-100
  root: "./data"
  val_split: 0.1 # Needed for Optuna
  num_classes: 100 # Updated for CIFAR-100
  input_channels: 3
  image_size: 32

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Identical block structure to CaFo)
model:
  name: "CaFo_CNN" # Engine adapts this for BP baseline
  params:
    # input_channels: 3 # Calculated
    block_channels: [32, 128, 512]
    activation: "ReLU"
    use_batchnorm: true
    kernel_size: 3 # Match CaFo config
    pool_kernel_size: 2 # Match CaFo config
    pool_stride: 2 # Match CaFo config
    # image_size: 32 # Calculated
    # num_classes: 100 # Calculated

# Optimizer Configuration
# !!! IMPORTANT !!! Update after running Optuna search
optimizer:
  type: "AdamW"
  lr: 0.001 # Placeholder - UPDATE THIS
  weight_decay: 0.0001 # Placeholder - UPDATE THIS

# Training Configuration (For final run)
training:
  epochs: 100
  criterion: "CrossEntropyLoss"
  log_interval: 100
  # scheduler: "CosineAnnealingLR" # Optional
  # scheduler_params: {}

# Hyperparameter Tuning Configuration (For Optuna)
tuning:
  enabled: true
  n_trials: 50
  num_epochs: 25 # Epochs per trial
  direction: "maximize"
  metric: "val_accuracy"
  sampler: "TPE"
  pruner: "Median"
  lr_range: [1.0e-5, 1.0e-2]
  wd_range: [1.0e-6, 1.0e-3]

# Checkpointing (Save best BP model)
checkpointing:
  checkpoint_dir: "checkpoints/bp_baseline_cifar100_cnn_3block" # Updated directory
  save_best_metric: "bp_val_accuracy" # Or bp_val_loss

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null
  wandb:
    use_wandb: true

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false
