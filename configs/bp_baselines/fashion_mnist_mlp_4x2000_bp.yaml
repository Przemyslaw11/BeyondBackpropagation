# File: configs/bp_baselines/fashion_mnist_mlp_4x2000_bp.yaml
# Configuration for Backpropagation (BP) Baseline on Fashion-MNIST with 4x2000 MLP
# This corresponds to the ff_fashion_mnist_mlp_4x2000 experiment.

# Inherit from base config
experiment_name: "bp_baseline_fashion_mnist_mlp_4x2000"
algorithm:
  name: "BP"

# Dataset Configuration (Match FF experiment)
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1 # Needed for Optuna & best model saving
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Identical structure to FF experiment)
model:
  name: "FF_MLP" # Engine adapts this for BP baseline creation
  params:
    # input_dim: 784 # Calculated
    hidden_dims: [2000, 2000, 2000, 2000]
    activation: "ReLU"
    # num_classes: 10 # Calculated
    # norm_type, normalize_layers are ignored by BP baseline logic

# Optimizer Configuration
# !!! IMPORTANT !!!
# Update lr and weight_decay below with the best values found by
# running scripts/run_optuna_search.py --config configs/bp_baselines/fashion_mnist_mlp_4x2000_bp.yaml
optimizer:
  type: "AdamW" # Match the type used in Optuna search
  lr: 0.001 # Placeholder - UPDATE THIS
  weight_decay: 0.0001 # Placeholder - UPDATE THIS
  # Add other fixed params if needed (e.g., betas for Adam)
  # params:
  #   betas: [0.9, 0.999]

# Training Configuration (For the final run)
training:
  epochs: 100 # Total epochs for final run
  criterion: "CrossEntropyLoss"
  log_interval: 100
  # Optional: Add scheduler config if used in final run
  # scheduler: "CosineAnnealingLR"
  # scheduler_params: {}

# Hyperparameter Tuning Configuration (Used by run_optuna_search.py)
tuning:
  enabled: true # Flag for scripts (optional)
  n_trials: 50
  num_epochs: 25 # Epochs *per trial* (e.g., 25% of final)
  direction: "maximize"
  metric: "val_accuracy" # Metric to optimize (use BP specific keys e.g., bp_val_accuracy)
  sampler: "TPE"
  pruner: "Median"
  lr_range: [1.0e-5, 1.0e-2]
  wd_range: [1.0e-6, 1.0e-3]

# Checkpointing (Save best BP model based on validation)
checkpointing:
  checkpoint_dir: "checkpoints/bp_baseline_fashion_mnist_mlp_4x2000"
  save_best_metric: "bp_val_accuracy" # Metric key used in bp.py logging (case-insensitive compare)

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null
  wandb:
    use_wandb: true

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false