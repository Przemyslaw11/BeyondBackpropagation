# Configuration for Backpropagation (BP) Baseline on Fashion-MNIST with 4x2000 MLP
# This corresponds to the ff_fashion_mnist_mlp_4x2000 experiment.

# Inherit from base config (handled by config_parser)
# Values here override base.yaml

# Experiment Identification
experiment_name: "bp_baseline_fashion_mnist_mlp_4x2000"
algorithm: "BP" # Specify Backpropagation baseline

# Dataset Configuration (Should match the corresponding FF experiment)
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1
  batch_size: 128
  num_workers: 4
  normalization:
    mean: [0.2860]
    std: [0.3530]
  augmentation: false # Match FF experiment

# Model Architecture Configuration (Identical architecture to FF experiment)
model:
  name: "FF_MLP" # Use the same architecture definition
  input_dim: 784
  hidden_dims: [2000, 2000, 2000, 2000]
  activation: "ReLU"
  output_dim: 10 # Standard output for classification

# Optimizer Configuration (For standard end-to-end BP)
optimizer:
  type: "AdamW" # Common choice for BP, can be tuned
  # lr and weight_decay will be tuned by Optuna, provide initial/placeholder if needed by engine
  lr: 0.001 # Placeholder, will be overridden by Optuna trial
  weight_decay: 0.01 # Placeholder, will be overridden by Optuna trial
  # Add other optimizer params like momentum if using SGD

# Training Configuration (Standard BP training)
training:
  epochs: 100 # Total epochs for the final run *after* tuning
  seed: 42
  device: "cuda"
  use_cuda: true
  criterion: "CrossEntropyLoss" # Standard loss for classification

# Hyperparameter Tuning Configuration (For Optuna)
tuning:
  enabled: true # Flag to indicate this config is for tuning (optional, could be inferred)
  n_trials: 50 # Number of Optuna trials to run
  num_epochs: 20 # Number of epochs *per trial* during tuning (less than final training)
  direction: "maximize" # Optimize for validation accuracy
  metric: "val_accuracy" # Metric the objective function returns
  sampler: "TPE" # Optuna sampler (TPE, Random)
  pruner: "Median" # Optuna pruner (Median, Hyperband, None)
  # Define search space for Optuna
  lr_range: [1.0e-5, 1.0e-2] # Log uniform search space for learning rate
  wd_range: [1.0e-6, 1.0e-1] # Log uniform search space for weight decay

# Logging Configuration
logging:
  level: "INFO"
  log_file: null
  wandb:
    use_wandb: true
    project: "BeyondBackpropagation"
    entity: null
    run_name: null # Set dynamically (e.g., include 'optuna' in the name)

# Monitoring/Profiling (Enable for baseline runs too)
monitoring:
  enabled: true
  interval_seconds: 1
profiling:
  enabled: true
  use_cuda_events: true
  profile_memory: true
