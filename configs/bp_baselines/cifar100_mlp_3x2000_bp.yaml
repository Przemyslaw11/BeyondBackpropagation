# File: configs/bp_baselines/cifar100_mlp_3x2000_bp.yaml
# Configuration for Backpropagation (BP) Baseline using the MF CIFAR-100 MLP Architecture

# Inherit from base config
experiment_name: "bp_cifar100_mlp_3x2000"
algorithm:
  name: "BP" # Specify Backpropagation

# Dataset Configuration (Matches MF counterpart)
data:
  name: "CIFAR100" # Updated for CIFAR-100
  root: "./data"
  val_split: 0.1
  num_classes: 100 # Updated for CIFAR-100
  input_channels: 3
  image_size: 32

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Matches MF counterpart)
model:
  name: "MF_MLP" # Use the same architecture class
  params:
    # input_dim: 3072 # Calculated (3 * 32 * 32)
    hidden_dims: [2000, 2000, 2000] # Same dimensions as MF
    activation: "ReLU"
    bias: true
    # num_classes: 100 # Calculated

# BP Training Configuration
training:
  epochs: 100 # Total training epochs
  criterion: "CrossEntropyLoss" # Standard loss for BP classification
  log_interval: 100

# BP Optimizer Configuration (Defaults from base, tuned via Optuna)
optimizer:
  type: "AdamW"
  # lr and weight_decay will be tuned by Optuna
  # Default values from base.yaml are placeholders if tuning is disabled
  lr: 0.001
  weight_decay: 0.0001

# Logging Configuration
logging:
  level: "INFO"
  wandb:
    use_wandb: true
    project: "BeyondBackpropagation" # Ensure consistency
    # run_name will be set dynamically (e.g., bp_cifar100_mlp_3x2000_trial_X)

# Checkpointing (Enabled for BP baselines)
checkpointing:
  checkpoint_dir: "checkpoints/bp_cifar100_mlp_3x2000" # Specific directory
  save_best_metric: "bp_val_accuracy" # Save based on validation accuracy

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false

# Hyperparameter Tuning Configuration (Enabled for BP baselines)
tuning:
  enabled: true # Enable Optuna tuning for this baseline
  n_trials: 50 # Number of Optuna trials
  num_epochs: 25 # Epochs per trial (adjust as needed for reasonable trial time)
  direction: "maximize"
  metric: "val_accuracy" # Optimize for validation accuracy
  sampler: "TPE"
  pruner: "Median"
  lr_range: [1.0e-5, 1.0e-2] # Log uniform range for learning rate
  wd_range: [1.0e-6, 1.0e-3] # Log uniform range for weight decay
