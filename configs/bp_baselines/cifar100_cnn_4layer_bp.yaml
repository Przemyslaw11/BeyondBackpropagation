# File: configs/bp_baselines/cifar100_cnn_4layer_bp.yaml
experiment_name: "bp_baseline_cifar100_cnn_4layer"
algorithm: { name: "BP" }
data: { name: "CIFAR100", root: "./data", val_split: 0.1, num_classes: 100, input_channels: 3, image_size: 32 }
data_loader: { batch_size: 128, num_workers: 4, pin_memory: true }
model: { name: "MF_CNN", params: { activation: "ReLU", bias: true } } # Use MF_CNN base name
optimizer:
  type: AdamW
  lr: 0.001227793956046801
  weight_decay: 1.227499260663016e-06
training:
  epochs: 100
  criterion: CrossEntropyLoss
  log_interval: 9999
  early_stopping_enabled: true
  early_stopping_metric: bp_val_loss
  early_stopping_patience: 20
  early_stopping_mode: min
  early_stopping_min_delta: 0.0
logging: { level: "INFO", wandb: { use_wandb: true } }
checkpointing: { checkpoint_dir: "checkpoints/bp_baseline_cifar100_cnn_4layer", save_best_metric: "bp_val_accuracy" }
monitoring: { enabled: true, energy_enabled: true, energy_interval_sec: 0.2 }
profiling: { enabled: true, verbose: false }
tuning: { enabled: false }