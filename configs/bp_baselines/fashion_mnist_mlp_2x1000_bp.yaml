# File: configs/bp_baselines/fashion_mnist_mlp_2x1000_bp.yaml
# Configuration for BP Baseline on Fashion-MNIST with 2x1000 MLP
# Corresponds to mf_fashion_mnist_mlp_2x1000 experiment

# Inherit from base config
experiment_name: "bp_baseline_fashion_mnist_mlp_2x1000"
algorithm:
  name: "BP"

# Dataset Configuration (Match MF experiment)
data:
  name: "FashionMNIST"
  root: "./data"
  val_split: 0.1 # Needed for Optuna
  num_classes: 10
  input_channels: 1
  image_size: 28

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (Identical structure to MF)
model:
  name: "MF_MLP" # Engine adapts this for BP baseline
  params:
    # input_dim: 784 # Calculated
    hidden_dims: [1000, 1000] # Match MF config
    activation: "ReLU" # Match MF config
    bias: true # Match MF config
    # num_classes: 10 # Calculated

# Optimizer Configuration
# !!! IMPORTANT !!! Update after running Optuna search
optimizer:
  type: "AdamW"
  lr: 0.001 # Placeholder - UPDATE THIS
  weight_decay: 0.0001 # Placeholder - UPDATE THIS

# Training Configuration (For final run)
training:
  epochs: 100
  criterion: "CrossEntropyLoss"
  log_interval: 100
  # scheduler: "CosineAnnealingLR" # Optional
  # scheduler_params: {}

# Hyperparameter Tuning Configuration (For Optuna)
tuning:
  enabled: true
  n_trials: 50
  num_epochs: 25 # Epochs per trial
  direction: "maximize"
  metric: "val_accuracy"
  sampler: "TPE"
  pruner: "Median"
  lr_range: [1.0e-5, 1.0e-2]
  wd_range: [1.0e-6, 1.0e-3]

# Checkpointing (Save best BP model)
checkpointing:
  checkpoint_dir: "checkpoints/bp_baseline_fashion_mnist_mlp_2x1000" # Updated directory
  save_best_metric: "bp_val_accuracy" # Or bp_val_loss

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null
  wandb:
    use_wandb: true

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false
