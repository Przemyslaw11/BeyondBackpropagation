# File: configs/mf/cifar10_mlp_3x2000.yaml
# Configuration for Mono-Forward (MF) on CIFAR-10 with 3x2000 MLP

# Inherit from base config
experiment_name: "mf_cifar10_mlp_3x2000"
algorithm:
  name: "MF"

# Dataset Configuration
data:
  name: "CIFAR10"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 3
  image_size: 32

# Data Loader Configuration
data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration
model:
  name: "MF_MLP"
  params:
    # input_dim: 3072 # Calculated (3 * 32 * 32)
    hidden_dims: [2000, 2000, 2000] # MF specific architecture for CIFAR-10/100
    activation: "ReLU"
    bias: true
    # num_classes: 10 # Calculated

# Algorithm Specific Configuration (Mono-Forward)
algorithm_params:
  optimizer_type: "Adam"
  lr: 0.0003241756767272183              # Placeholder - overridden by Optuna
  weight_decay: 0.0      # Placeholder - currently not tuned, can add wd range if desired
  epochs_per_layer: 28   # Placeholder - overridden by Optuna
  log_interval: 9999     # Reduce logging noise during trials

# <<< ADDED/MODIFIED: Training Configuration for Early Stopping >>>
training:
  criterion: "CrossEntropyLoss" # Used internally by MF layer trainer
  log_interval: 9999
  early_stopping_enabled: true
  early_stopping_metric: "mf_val_accuracy" # MF eval only returns accuracy
  early_stopping_patience: 10              # Stop if val acc doesn't improve for 10 layer stages
  early_stopping_mode: "max"               # Always maximize accuracy for MF
  early_stopping_min_delta: 0.01           # Require 0.01% improvement

# Logging Configuration
logging:
  level: "INFO"
  # log_file: null
  wandb:
    use_wandb: true

# Checkpointing
checkpointing:
  checkpoint_dir: "checkpoints/mf_cifar10_mlp_3x2000" # Specific directory

# Monitoring/Profiling
monitoring:
  enabled: true
  energy_enabled: true
  energy_interval_sec: 0.2
profiling:
  enabled: true
  verbose: false
