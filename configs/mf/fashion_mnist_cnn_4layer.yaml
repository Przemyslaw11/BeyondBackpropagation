# File: configs/mf/fashion_mnist_cnn_4layer.yaml
experiment_name: "mf_fashion_mnist_cnn_4layer"
algorithm: { name: "MF" }
data: { name: "FashionMNIST", root: "./data", val_split: 0.1, num_classes: 10, input_channels: 1, image_size: 28 }
data_loader: { batch_size: 128, num_workers: 4, pin_memory: true }
model: { name: "MF_CNN", params: { activation: "ReLU", bias: true } }
algorithm_params:
  optimizer_type: Adam
  lr: 0.0005843153807596576
  weight_decay: 0.0
  epochs_per_layer: 23
  log_interval: 9999
  mf_early_stopping_enabled: true
  mf_early_stopping_patience: 10
  mf_early_stopping_min_delta: 0.0001
logging: { level: "INFO", wandb: { use_wandb: true } }
checkpointing: { checkpoint_dir: "checkpoints/mf_fashion_mnist_cnn_4layer" }
monitoring: { enabled: true, energy_enabled: true, energy_interval_sec: 0.2 }
profiling: { enabled: true, verbose: false }