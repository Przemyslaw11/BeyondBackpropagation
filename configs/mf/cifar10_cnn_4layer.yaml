# File: configs/mf/cifar10_cnn_4layer.yaml
# Configuration for Mono-Forward (MF) on CIFAR-10 with 4-Layer CNN

experiment_name: "mf_cifar10_cnn_4layer"
algorithm:
  name: "MF"

data:
  name: "CIFAR10"
  root: "./data"
  val_split: 0.1
  num_classes: 10
  input_channels: 3
  image_size: 32

data_loader:
  batch_size: 128
  num_workers: 4
  pin_memory: true

# Model Architecture Configuration (MF_CNN)
model:
  name: "MF_CNN" # <<< USE NEW ARCHITECTURE NAME
  params:
    # input_channels: 3 # Inferred from data
    # num_classes: 10 # Inferred from data
    # image_size: 32 # Inferred from data
    activation: "ReLU" # Default, used for logging
    bias: true

algorithm_params:
  optimizer_type: Adam
  lr: 0.0001025350969016849
  weight_decay: 0.0
  epochs_per_layer: 49
  log_interval: 9999
  mf_early_stopping_enabled: true
  mf_early_stopping_patience: 15
  mf_early_stopping_min_delta: 0.0001


logging: { level: "INFO", wandb: { use_wandb: true } }
checkpointing: { checkpoint_dir: "checkpoints/mf_cifar10_cnn_4layer" }
monitoring: { enabled: true, energy_enabled: true, energy_interval_sec: 0.2 }
profiling: { enabled: true, verbose: false }