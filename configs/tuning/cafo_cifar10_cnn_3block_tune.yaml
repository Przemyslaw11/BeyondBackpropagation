# File: configs/tuning/cafo_cifar10_cnn_3block_tune.yaml
# UPDATED: Added predictor early stopping parameters

experiment_name: "tune_cafo_cifar10_cnn_3block"
algorithm: 
  name: CaFo
data: { name: "CIFAR10", root: "./data", val_split: 0.1, num_classes: 10, input_channels: 3, image_size: 32 }
data_loader: { batch_size: 128, num_workers: 0, pin_memory: false }
model:
  name: "CaFo_CNN"
  params: { block_channels: [32, 128, 512], activation: "ReLU", use_batchnorm: true, kernel_size: 3, pool_kernel_size: 2, pool_stride: 2 }

# Algorithm Specific Configuration (Placeholders for Optuna, plus ES config)
algorithm_params:
  train_blocks: false # Tuning random blocks version
  predictor_optimizer_type: "Adam"
  predictor_lr: 0.001                 # Placeholder - Optuna overrides
  predictor_weight_decay: 0.0         # Placeholder - Optuna overrides
  loss_type: "CrossEntropyLoss"
  num_epochs_per_block: 500           # Placeholder - Optuna overrides
  log_interval: 9999
  aggregation_method: "sum"

  # --- Predictor Early Stopping Configuration --- # <<< ADDED >>>
  predictor_early_stopping_enabled: true
  predictor_early_stopping_metric: "val_loss"   # Monitor validation loss
  predictor_early_stopping_patience: 8         # Patience (adjust based on epochs range)
  predictor_early_stopping_mode: "min"          # Minimize validation loss
  predictor_early_stopping_min_delta: 0.001     # Minimum required improvement

logging: { level: "INFO", wandb: { use_wandb: false } } # Disable W&B for Optuna trials
checkpointing: { checkpoint_dir: null } # Disable checkpoints for Optuna trials
monitoring: { enabled: false, energy_enabled: false } # Disable monitoring for speed
profiling: { enabled: false } # Disable profiling for speed

# --- Optuna Tuning Configuration ---
tuning:
  enabled: true # <<< Enable Optuna >>>
  n_trials: 50 # Number of trials to run
  direction: "maximize"
  metric: "val_accuracy" # Optuna objective: Maximize final validation accuracy
  sampler: "TPE"
  pruner: "None" # Pruning not effective for CaFo's final metric reporting
  # --- Define RANGES for CaFo predictor parameters ---
  # Ranges informed by previous best run (Acc≈67.48%) and defaults
  cafo_predictor_lr_range: [2.0e-4, 5.0e-3]    # Log range around 0.001
  cafo_predictor_wd_range: [1.0e-7, 1.0e-4]    # Explore small WD (default was 0.0)
  cafo_epochs_per_block_range: [300, 800]      # Linear range around default 500