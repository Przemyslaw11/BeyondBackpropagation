# File: configs/cafo/fashion_mnist_cnn_3block_tune.yaml
experiment_name: "tune_cafo_fashion_mnist_cnn_3block"
algorithm: { name: "CaFo" }
data: { name: "FashionMNIST", root: "./data", val_split: 0.1, num_classes: 10, input_channels: 1, image_size: 28 }
data_loader: { batch_size: 128, num_workers: 0, pin_memory: false }
model:
  name: "CaFo_CNN"
  params: { block_channels: [32, 128, 512], activation: "ReLU", use_batchnorm: true, kernel_size: 3, pool_kernel_size: 2, pool_stride: 2 }

# Algorithm Specific Configuration (Placeholders)
algorithm_params:
  train_blocks: false
  predictor_optimizer_type: "Adam"
  predictor_lr: 0.001                 # Placeholder
  predictor_weight_decay: 0.0         # Placeholder
  loss_type: "CrossEntropyLoss"
  num_epochs_per_block: 5000          # Placeholder (was 5000, likely too high)
  log_interval: 9999
  aggregation_method: "sum"

logging: { level: "INFO", wandb: { use_wandb: false } }
checkpointing: { checkpoint_dir: null }
monitoring: { enabled: false, energy_enabled: false }
profiling: { enabled: false }

# --- Optuna Tuning Configuration ---
tuning:
  enabled: true
  n_trials: 50 # Adjust
  direction: "maximize"
  metric: "val_accuracy"
  sampler: "TPE"
  pruner: "None"
  # --- Ranges informed by best run (Acc≈90.47%) ---
  cafo_predictor_lr_range: [2.0e-4, 5.0e-3]  # Around 0.001
  cafo_predictor_wd_range: [1.0e-7, 1.0e-4]  # Explore small WD
  cafo_epochs_per_block_range: [100, 1000]   # Lowered range significantly from 5000