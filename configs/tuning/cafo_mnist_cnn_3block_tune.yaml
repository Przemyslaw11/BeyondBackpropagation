# File: configs/cafo/mnist_cnn_3block_tune.yaml
# Configuration for Optuna TUNING of CaFo (Random Blocks) on MNIST

experiment_name: "tune_cafo_mnist_cnn_3block"
algorithm: { name: "CaFo" }

# Dataset / Loader / Model Config (Same as MNIST/FMNIST CaFo)
data: { name: "MNIST", root: "./data", val_split: 0.1, num_classes: 10, input_channels: 1, image_size: 28 }
data_loader: { batch_size: 128, num_workers: 0, pin_memory: false }
model:
  name: "CaFo_CNN"
  params: { block_channels: [32, 128, 512], activation: "ReLU", use_batchnorm: true, kernel_size: 3, pool_kernel_size: 2, pool_stride: 2 }

# Algorithm Specific Configuration (Placeholders)
algorithm_params:
  train_blocks: false                # Random blocks - no block training
  predictor_optimizer_type: "Adam"   # Fixed predictor optimizer type
  predictor_lr: 0.001                # Placeholder - overridden by Optuna
  predictor_weight_decay: 0.0        # Placeholder - overridden by Optuna
  loss_type: "CrossEntropyLoss"      # Fixed predictor loss
  num_epochs_per_block: 500          # Placeholder - overridden by Optuna (was 500 in best non-tuned run)
  log_interval: 9999                 # Reduce logging noise during trials
  aggregation_method: "sum"          # Fixed aggregation method

# Logging / Checkpointing / Monitoring / Profiling (Disabled for tuning trials)
logging: { level: "INFO", wandb: { use_wandb: false } }
checkpointing: { checkpoint_dir: null }
monitoring: { enabled: false, energy_enabled: false }
profiling: { enabled: false }

# --- Optuna Tuning Configuration ---
tuning:
  enabled: true # <<< Enable Optuna >>>
  n_trials: 50  # Number of trials to run (adjust as needed)
  direction: "maximize"
  metric: "val_accuracy" # Objective: maximize validation accuracy
  sampler: "TPE"         # Default sampler
  pruner: "None"         # Recommended for CaFo/MF style training
  # --- Ranges informed by best non-tuned run (Acc≈98.43%) ---
  cafo_predictor_lr_range: [2.0e-4, 5.0e-3]  # Log range around 0.001
  cafo_predictor_wd_range: [1.0e-7, 1.0e-4]  # Explore small WD, previous was 0.0
  cafo_epochs_per_block_range: [50, 500]     # Linear range around 500 (MNIST likely needs fewer than FMNIST/CIFAR)