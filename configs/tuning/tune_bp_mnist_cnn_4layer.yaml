experiment_name: tune_bp_mnist_cnn_4layer
algorithm:
  name: BP
data:
  name: MNIST
  root: ./data
  val_split: 0.1
  num_classes: 10
  input_channels: 1
  image_size: 28
data_loader:
  batch_size: 128
  num_workers: 0
  pin_memory: false
model:
  name: MF_CNN
  params:
    activation: ReLU
    bias: true
optimizer:
  type: AdamW
  lr: 0.0010207043479047344
  weight_decay: 0.00045484290975493405
training:
  epochs: 100
  criterion: CrossEntropyLoss
  log_interval: 9999
  early_stopping_enabled: true
  early_stopping_metric: bp_val_loss
  early_stopping_patience: 10
  early_stopping_mode: min
  early_stopping_min_delta: 0.0
logging:
  level: INFO
  wandb:
    use_wandb: false
checkpointing:
  checkpoint_dir: null
monitoring:
  enabled: false
  energy_enabled: false
profiling:
  enabled: false
tuning:
  enabled: true
  n_trials: 30
  num_epochs: 25
  direction: maximize
  metric: val_accuracy
  sampler: TPE
  pruner: Median
  lr_range:
  - 1.0e-05
  - 0.01
  wd_range:
  - 1.0e-06
  - 0.001
