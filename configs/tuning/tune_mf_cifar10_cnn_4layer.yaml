experiment_name: tune_mf_cifar10_cnn_4layer
algorithm:
  name: MF
data:
  name: CIFAR10
  root: ./data
  val_split: 0.1
  num_classes: 10
  input_channels: 3
  image_size: 32
data_loader:
  batch_size: 128
  num_workers: 0
  pin_memory: false
model:
  name: MF_CNN
  params:
    activation: ReLU
    bias: true
algorithm_params:
  optimizer_type: Adam
  lr: 0.0001025350969016849
  weight_decay: 0.0
  epochs_per_layer: 49
  log_interval: 9999
  mf_early_stopping_enabled: true
  mf_early_stopping_patience: 15
  mf_early_stopping_min_delta: 0.0001
logging:
  level: INFO
  wandb:
    use_wandb: false
checkpointing:
  checkpoint_dir: null
monitoring:
  enabled: false
  energy_enabled: false
profiling:
  enabled: false
tuning:
  enabled: true
  n_trials: 50
  direction: maximize
  metric: val_accuracy
  sampler: TPE
  pruner: None
  mf_lr_range:
  - 1.0e-05
  - 0.005
  mf_epochs_per_layer_range:
  - 15
  - 50
